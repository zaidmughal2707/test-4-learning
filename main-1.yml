name: Wokflow

on: 
  push:
    branches: ['master']

jobs:
  build:
    runs-on: 
      ${{ matrix.os }}-latest


    strategy:
      matrix:
        os: [ubuntu]

    steps:

      - name: starting job actuallt 
        run: echo "Starting right after this echo statement"


      - name: Checking out to fetch Code
        uses: action/checkout@v4

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin"

      - name: Building image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/flask-app:latest .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/flask-app:latest


      - name: Deploying to ubuntu
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOSTIP }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull  ${{ secrets.DOCKER_USERNAME }}/flask-app:latest
            docker stop flask-app || true
            docker rm flask-app || true
            docker run -d -p 5000:5000 --name flask-app ${{ secrets.DOCKER_USERNAME }}/flask-app:latest
